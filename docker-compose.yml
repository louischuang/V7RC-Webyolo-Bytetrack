services:
  web:
    build:
      context: .
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_YOLO_MODEL_URL: /models/yolo/yolo11n.onnx
      NEXT_PUBLIC_YOLO_LABELS_URL: /models/yolo/coco.names
      NEXT_PUBLIC_LLM_RUNTIME: transformers
      NEXT_PUBLIC_LLM_MODEL_ID: gemma-4-E2B-it-ONNX
      NEXT_PUBLIC_LLM_MODEL_URL: /models/gemma4-e2b-it-onnx
      NEXT_PUBLIC_STREAM_GATEWAY_URL: ${STREAM_GATEWAY_PUBLIC_URL:-http://localhost:3001}
    volumes:
      - ./models:/app/public/models:ro
    restart: unless-stopped

  stream-gateway:
    build:
      context: ./stream-gateway
    ports:
      - "${STREAM_GATEWAY_PORT:-3001}:3001"
    environment:
      STREAM_GATEWAY_PORT: 3001
      STREAM_OUTPUT_DIR: /var/lib/v7rc-streams
      STREAM_DEFAULT_OUTPUT: ${STREAM_DEFAULT_OUTPUT:-mjpg}
    volumes:
      - ./streams:/var/lib/v7rc-streams
    restart: unless-stopped
