services:
  web:
    build:
      context: .
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_YOLO_MODEL_URL: /models/yolo/yolo11n.onnx
      NEXT_PUBLIC_YOLO_LABELS_URL: /models/yolo/coco.names
      NEXT_PUBLIC_LLM_RUNTIME: transformers
      NEXT_PUBLIC_LLM_DEVICE: webgpu
      NEXT_PUBLIC_LLM_MODEL_ID: gemma-4-E2B-it-ONNX
      NEXT_PUBLIC_LLM_MODEL_URL: /models/gemma4-e2b-it-onnx
      NEXT_PUBLIC_STREAM_GATEWAY_URL: ${STREAM_GATEWAY_PUBLIC_URL:-http://localhost:3010}
    volumes:
      - ./models:/app/public/models:ro
    restart: unless-stopped

  stream-gateway:
    build:
      context: ./stream-gateway
    ports:
      - "${STREAM_GATEWAY_PORT:-3010}:3010"
    environment:
      STREAM_GATEWAY_PORT: 3010
      STREAM_OUTPUT_DIR: /var/lib/v7rc-streams
      STREAM_DEFAULT_OUTPUT: ${STREAM_DEFAULT_OUTPUT:-mjpg}
      YTDLP_FORMAT: "${YTDLP_FORMAT:-best[height<=720][ext=mp4]/best[height<=720]/best}"
      YTDLP_TIMEOUT_MS: ${YTDLP_TIMEOUT_MS:-45000}
      YTDLP_COOKIES_FILE: ${YTDLP_COOKIES_FILE:-}
      YTDLP_USER_AGENT: ${YTDLP_USER_AGENT:-}
    volumes:
      - ./streams:/var/lib/v7rc-streams
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3010/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
